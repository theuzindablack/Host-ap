<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOST PRINCIPAL | SISTEMA_AP_001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ap: { primary: '#165DFF', dark: '#0A0E27', gray: '#1A1F38', orange: '#FF7D00', green: '#2ECC71', red: '#e74c3c', yellow: '#FACC15', vip: '#9333EA' } } } } }
    </script>
</head>
<body class="bg-gradient-to-br from-black to-gray-900 text-white min-h-screen p-4">
    <div class="bg-ap-yellow text-black font-bold text-center py-3 mb-6 rounded-lg shadow-lg">
        ⚙️ HOST PRINCIPAL | ID FIXO: SISTEMA_AP_001
        <br><span id="statusHost" class="text-red-700">🔄 INICIANDO...</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-ap-gray rounded-xl border-2 border-ap-yellow/50 p-4 shadow-xl">
            <h2 class="text-xl font-bold text-ap-yellow mb-4">👥 USUÁRIOS CONECTADOS</h2>
            <div id="listaUsuarios" class="space-y-2 text-sm max-h-[400px] overflow-y-auto">
                <div class="text-gray-500 text-center py-4">Aguardando conexões...</div>
            </div>
        </div>
        <div class="bg-ap-gray rounded-xl border-2 border-ap-vip/50 p-4 shadow-xl">
            <h2 class="text-xl font-bold text-ap-vip mb-4">💬 HISTÓRICO DE MENSAGENS</h2>
            <div id="historico" class="space-y-2 text-sm max-h-[400px] overflow-y-auto bg-black/60 p-3 rounded-lg"></div>
        </div>
    </div>

    <script>
        const ID_FIXO = "SISTEMA_AP_001";
        let peer;
        let usuarios = [];
        let banco = { historico: [] };

        function iniciarHost() {
            // SERVIDORES NOVOS E ESTÁVEIS
            peer = new Peer(ID_FIXO, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', () => {
                document.getElementById('statusHost').className = 'text-green-700';
                document.getElementById('statusHost').textContent = '✅ ONLINE E FUNCIONANDO';
            });

            peer.on('connection', (conn) => {
                conn.on('data', (dados) => processarDados(conn, dados));
                
                conn.on('close', () => {
                    usuarios = usuarios.filter(u => u.conn !== conn);
                    atualizarTodosAdms();
                    atualizarTelaHost();
                });

                conn.on('error', () => {});
            });

            peer.on('error', (erro) => {
                setTimeout(iniciarHost, 2000);
            });
        }

        function processarDados(conn, dados) {
            // CADASTRO DE USUÁRIO
            if(dados.tipo === "cadastrar_usuario") {
                const novo = {
                    conn: conn,
                    id: dados.idUnico,
                    nome: dados.nomeEscolhido,
                    tipo: dados.tipoUsuario,
                    status: "pendente",
                    modo: "",
                    valor: 0
                };
                usuarios.push(novo);
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }

            // CLIENTE ENVIA MENSAGEM
            if(dados.tipo === "enviar_mensagem") {
                const user = usuarios.find(u => u.id === dados.idUsuario);
                banco.historico.push({ remetente: user?.nome, texto: dados.texto, hora: new Date().toLocaleTimeString(), tipo: 'msg' });
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }

            // CLIENTE DEFINE APOSTA
            if(dados.tipo === "definir_aposta") {
                const user = usuarios.find(u => u.id === dados.idUsuario);
                if(user) {
                    user.modo = dados.modo;
                    user.valor = dados.valor;
                    user.status = "aguardando_print";
                }
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }

            // CLIENTE ENVIA PRINT
            if(dados.tipo === "enviar_print") {
                const user = usuarios.find(u => u.id === dados.idUsuario);
                if(user) user.status = "analise";
                banco.historico.push({ remetente: user?.nome, imagem: dados.img, hora: new Date().toLocaleTimeString(), tipo: 'print' });
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }

            // ADM AÇÕES
            if(dados.tipo === "acao_adm") {
                const user = usuarios.find(u => u.id === dados.idAlvo);
                if(user) {
                    user.status = dados.statusNovo;
                    if(dados.texto) user.conn.send({tipo: 'mensagem', texto: dados.texto});
                }
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }

            // ADM ENVIA CÓDIGO
            if(dados.tipo === "enviar_codigo") {
                const user = usuarios.find(u => u.id === dados.idAlvo);
                if(user) user.conn.send({tipo: 'codigo_recebido', cod: dados.cod, sen: dados.sen});
                return;
            }

            // ADM ENVIA MENSAGEM DIRETA
            if(dados.tipo === "msg_adm_cliente") {
                const user = usuarios.find(u => u.id === dados.idAlvo);
                if(user) user.conn.send({tipo: 'mensagem', texto: dados.texto});
                banco.historico.push({ remetente: "ADM", texto: dados.texto, hora: new Date().toLocaleTimeString(), tipo: 'msg' });
                atualizarTodosAdms();
                atualizarTelaHost();
                return;
            }
        }

        // ✅ FUNÇÃO PRINCIPAL: ENVIA TUDO PARA ADMS SEMPRE
        function atualizarTodosAdms() {
            const adms = usuarios.filter(u => u.tipo === "adm");
            const dadosEnvio = {
                tipo: 'atualizacao_total',
                lista: usuarios.map(u => ({id:u.id,nome:u.nome,tipo:u.tipo,status:u.status,modo:u.modo,valor:u.valor})),
                historico: banco.historico
            };
            adms.forEach(adm => {
                if(adm.conn.open) adm.conn.send(dadosEnvio);
            });
        }

        function atualizarTelaHost() {
            const el = document.getElementById('listaUsuarios');
            el.innerHTML = usuarios.length ? '' : '<div class="text-gray-500 text-center py-4">Nenhum usuário</div>';
            usuarios.forEach(u => {
                el.innerHTML += `<div class="p-2 bg-black/40 rounded border-l-2 ${u.tipo==='adm'?'border-red-500':'border-green-500'}">
                    <b>${u.nome}</b> <span class="text-xs">(${u.tipo})</span><br>
                    <span class="text-xs">Status: ${u.status} | ${u.modo} R$${u.valor}</span>
                </div>`;
            });

            const elHist = document.getElementById('historico');
            elHist.innerHTML = '';
            banco.historico.forEach(m => {
                if(m.tipo === 'msg') elHist.innerHTML += `<div class="text-xs py-1">[${m.hora}] ${m.remetente}: ${m.texto}</div>`;
                if(m.tipo === 'print') elHist.innerHTML += `<div class="text-xs py-1 text-yellow-400">[${m.hora}] 📸 ${m.remetente} enviou print</div>`;
            });
            elHist.scrollTop = elHist.scrollHeight;
        }

        iniciarHost();
    </script>
</body>
</html>
